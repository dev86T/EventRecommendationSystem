<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Система Рекомендаций Мероприятий</title>
    <style>
      /* Light Theme - мягкий серый фон, черные буквы */
      :root[data-theme="light"] {
        --bg-primary: #f8f9fa;
        --bg-secondary: #ffffff;
        --bg-card: #ffffff;
        --text-primary: #1a1a1a;
        --text-secondary: #4a5568;
        --text-muted: #718096;
        --border-color: #e2e8f0;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        --shadow-hover: 0 4px 16px rgba(0, 0, 0, 0.12);
        --input-bg: #ffffff;
        --input-text: #1a1a1a;
      }
      
      /* Dark Theme - темно-серый фон, БЕЛЫЕ буквы */
      :root[data-theme="dark"] {
        --bg-primary: #1a1a1a;
        --bg-secondary: #2d2d2d;
        --bg-card: #3a3a3a;
        --text-primary: #ffffff;
        --text-secondary: #e0e0e0;
        --text-muted: #b0b0b0;
        --border-color: #555555;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        --shadow-hover: 0 4px 16px rgba(0, 0, 0, 0.6);
        --input-bg: #2d2d2d;
        --input-text: #ffffff;
      }
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        transition: background-color 0.3s ease, color 0.3s ease;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      }
      
      /* Критически важно для форм! */
      input, textarea, select {
        background-color: var(--input-bg) !important;
        color: var(--input-text) !important;
        border: 1px solid var(--border-color) !important;
      }
      
      input::placeholder, textarea::placeholder {
        color: var(--text-muted) !important;
        opacity: 0.7;
      }
      
      .theme-toggle-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        color: white;
        font-size: 28px;
        cursor: pointer;
        box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
        transition: all 0.3s ease;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .theme-toggle-btn:hover {
        transform: scale(1.1) rotate(15deg);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
      }
      
      .theme-toggle-btn:active {
        transform: scale(0.95);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function() {
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        
        window.addEventListener('DOMContentLoaded', () => {
          const btn = document.createElement('button');
          btn.className = 'theme-toggle-btn';
          btn.innerHTML = savedTheme === 'dark' ? '☀️' : '🌙';
          btn.title = savedTheme === 'dark' ? 'Переключить на светлую тему' : 'Переключить на тёмную тему';
          
          btn.onclick = () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            btn.innerHTML = next === 'dark' ? '☀️' : '🌙';
            btn.title = next === 'dark' ? 'Переключить на светлую тему' : 'Переключить на тёмную тему';
          };
          
          document.body.appendChild(btn);
        });
      })();
    </script>
  </body>
</html>
