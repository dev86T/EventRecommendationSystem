version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: eventrecommendation_db
    restart: always
    environment:
      POSTGRES_DB: eventrecommendation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend/EventRecommendationSystem.API
    container_name: event_backend
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=eventrecommendation;Username=postgres;Password=postgres
    
  frontend:
    build: ./frontend
    container_name: event_frontend
    ports:
      - "3000:3000"
    depends:
      - backend
volumes:
  postgres_data:
